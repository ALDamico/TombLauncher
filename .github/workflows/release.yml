name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.3)'
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set VERSION
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            echo "VERSION=${HEAD_REF#release/}" >> $GITHUB_ENV
          fi

      - name: Validate version matches .csproj
        if: github.event_name != 'workflow_dispatch'
        run: |
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/TombLauncher/TombLauncher.csproj)
          if [ "$CSPROJ_VERSION" != "$VERSION" ]; then
            echo "::error::Branch release/$VERSION does not match .csproj ($CSPROJ_VERSION). Run /bump-version before creating the release branch."
            exit 1
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install system dependencies
        run: sudo apt-get install -y libfuse2 rpm

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool-x86_64.AppImage

      - name: Install PupNet
        run: |
          dotnet tool install -g KuiperZone.PupNet
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: pupnet deploy/TombLauncher.pupnet.conf -k AppImage -c Release --app-version $VERSION -y

      - name: Build DEB
        run: pupnet deploy/TombLauncher.pupnet.conf -k Deb -c Release --app-version $VERSION -y

      - name: Build RPM
        run: pupnet deploy/TombLauncher.pupnet.conf -k Rpm -c Release --app-version $VERSION -y

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: deploy/Output/

  build-windows:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set VERSION
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            "VERSION=${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            $headRef = '${{ github.event.pull_request.head.ref }}'
            $ver = $headRef -replace '^release/', ''
            "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Validate version matches .csproj
        if: github.event_name != 'workflow_dispatch'
        shell: pwsh
        run: |
          $csprojVersion = (Select-String -Path 'src/TombLauncher/TombLauncher.csproj' -Pattern '<Version>([^<]+)</Version>').Matches[0].Groups[1].Value
          if ($csprojVersion -ne $env:VERSION) {
            Write-Error "Branch release/$env:VERSION does not match .csproj ($csprojVersion). Run /bump-version before creating the release branch."
            exit 1
          }

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained
        shell: pwsh
        run: |
          dotnet publish src/TombLauncher/TombLauncher.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=$env:VERSION `
            -o src/TombLauncher/bin/Release/publish-self-contained

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:VERSION" `
            "/DOutputBaseFilename=TombLauncher-$env:VERSION-setup" `
            "deploy\installer-script.iss"

      - name: Build portable ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "src/TombLauncher/bin/Release/publish-self-contained/*" `
            -DestinationPath "deploy/Output/TombLauncher-$env:VERSION-portable.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: deploy/Output/

  create-release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set VERSION
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            echo "VERSION=${HEAD_REF#release/}" >> $GITHUB_ENV
          fi

      - uses: actions/download-artifact@v4
        with:
          path: staging

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping"
          else
            git tag v$VERSION
            git push origin v$VERSION
          fi

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TombLauncher ${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          files: |
            staging/**/*.AppImage
            staging/**/*.deb
            staging/**/*.rpm
            staging/**/*.exe
            staging/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-appcast:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Set VERSION
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            echo "VERSION=${HEAD_REF#release/}" >> $GITHUB_ENV
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install netsparkle-generate-appcast
        run: |
          dotnet tool install -g NetSparkleUpdater.Tools.AppCastGenerator
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Download release artifacts
        run: |
          mkdir artifacts
          gh release download v$VERSION \
            --repo ALDamico/TombLauncher \
            --pattern "TombLauncher-$VERSION-setup.exe" \
            --pattern "tomb-launcher-$VERSION-1.x86_64.AppImage" \
            --pattern "*portable.zip" \
            --dir artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and sign appcast.xml
        env:
          APPCAST_PRIVATE_KEY: ${{ secrets.APPCAST_PRIVATE_KEY }}
          DOTNET_ROLL_FORWARD: Major
        run: |
          BASE_URL="https://github.com/ALDamico/TombLauncher/releases/download/v$VERSION/"
          APPCAST_PUBLIC_KEY="RoxRb1RImp7yakYKUN+fEe+lt1WC2CWwnz+2pz4GSH8="
          mkdir appcast-output

          curl -fsSL "https://tomblauncher.app/updates/appcast.xml" \
            -o appcast-output/appcast.xml 2>/dev/null || true

          COMMON_ARGS=(
            --private-key-override "$APPCAST_PRIVATE_KEY"
            --public-key-override "$APPCAST_PUBLIC_KEY"
            --use-ed25519-signature-attribute
            --product-name "Tomb Launcher"
            --human-readable
            --reparse-existing
            -a appcast-output/
          )

          netsparkle-generate-appcast \
            --single-file "artifacts/TombLauncher-$VERSION-setup.exe" \
            --file-version "$VERSION" --os windows \
            --base-url "$BASE_URL" "${COMMON_ARGS[@]}"

          netsparkle-generate-appcast \
            --single-file "artifacts/tomb-launcher-$VERSION-1.x86_64.AppImage" \
            --file-version "$VERSION" --os linux \
            --base-url "$BASE_URL" "${COMMON_ARGS[@]}"

          cp "artifacts/TombLauncher-$VERSION-portable.zip" appcast-output/

          netsparkle-generate-appcast \
            --single-file "appcast-output/TombLauncher-$VERSION-portable.zip" \
            --file-version "$VERSION" --os windows --channel portable \
            --base-url "https://tomblauncher.app/updates/" "${COMMON_ARGS[@]}"

      - name: Upload to tomblauncher.app
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PATH: ${{ secrets.DEPLOY_SSH_PATH }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key -P $SSH_PORT \
            appcast-output/appcast.xml \
            appcast-output/appcast.xml.signature \
            "$SSH_USER@$SSH_HOST:$SSH_PATH/"
          scp -i ~/.ssh/deploy_key -P $SSH_PORT \
            "appcast-output/TombLauncher-$VERSION-portable.zip" \
            "$SSH_USER@$SSH_HOST:$SSH_PATH/"
