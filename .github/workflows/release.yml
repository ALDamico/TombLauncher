name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.3)'
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set VERSION
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            echo "VERSION=${HEAD_REF#release/}" >> $GITHUB_ENV
          fi

      - name: Validate version matches .csproj
        if: github.event_name != 'workflow_dispatch'
        run: |
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/TombLauncher/TombLauncher.csproj)
          if [ "$CSPROJ_VERSION" != "$VERSION" ]; then
            echo "::error::Branch release/$VERSION does not match .csproj ($CSPROJ_VERSION). Run /bump-version before creating the release branch."
            exit 1
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install system dependencies
        run: sudo apt-get install -y libfuse2 rpm

      - name: Install PupNet
        run: |
          dotnet tool install -g KuiperZone.PupNet
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build AppImage
        run: pupnet deploy/TombLauncher.pupnet.conf -k AppImage -c Release --app-version $VERSION -y

      - name: Build DEB
        run: pupnet deploy/TombLauncher.pupnet.conf -k Deb -c Release --app-version $VERSION -y

      - name: Build RPM
        run: pupnet deploy/TombLauncher.pupnet.conf -k Rpm -c Release --app-version $VERSION -y

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: deploy/Output/

  build-windows:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set VERSION
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            "VERSION=${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            $headRef = '${{ github.event.pull_request.head.ref }}'
            $ver = $headRef -replace '^release/', ''
            "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Validate version matches .csproj
        if: github.event_name != 'workflow_dispatch'
        shell: pwsh
        run: |
          $csprojVersion = (Select-String -Path 'src/TombLauncher/TombLauncher.csproj' -Pattern '<Version>([^<]+)</Version>').Matches[0].Groups[1].Value
          if ($csprojVersion -ne $env:VERSION) {
            Write-Error "Branch release/$env:VERSION does not match .csproj ($csprojVersion). Run /bump-version before creating the release branch."
            exit 1
          }

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained
        shell: pwsh
        run: |
          dotnet publish src/TombLauncher/TombLauncher.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=$env:VERSION `
            -o src/TombLauncher/bin/Release/publish-self-contained

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:VERSION" `
            "/DOutputBaseFilename=TombLauncher-$env:VERSION-setup" `
            "deploy\installer-script.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: deploy/Output/*.exe

  create-release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set VERSION
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            echo "VERSION=${HEAD_REF#release/}" >> $GITHUB_ENV
          fi

      - uses: actions/download-artifact@v4
        with:
          path: staging

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v$VERSION
          git push origin v$VERSION

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TombLauncher ${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          files: |
            staging/**/*.AppImage
            staging/**/*.deb
            staging/**/*.rpm
            staging/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
