name: Deploy Appcast

on:
  release:
    types: [published]

jobs:
  deploy-appcast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set VERSION
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install netsparkle-generate-appcast
        run: |
          dotnet tool install -g NetSparkleUpdater.Tools.AppCastGenerator
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Download release artifacts
        run: |
          mkdir artifacts
          gh release download v$VERSION \
            --pattern "TombLauncher-$VERSION-setup.exe" \
            --pattern "TombLauncher-$VERSION-x86_64.AppImage" \
            --pattern "TombLauncher-$VERSION-portable-win-x64.zip" \
            --dir artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and sign appcast.xml
        env:
          APPCAST_PRIVATE_KEY: ${{ secrets.APPCAST_PRIVATE_KEY }}
          DOTNET_ROLL_FORWARD: Major
        run: |
          BASE_URL="https://github.com/ALDamico/TombLauncher/releases/download/v$VERSION/"
          mkdir appcast-output

          # Scarica l'appcast esistente per preservare le versioni precedenti
          curl -fsSL "https://tomblauncher.app/updates/appcast.xml" \
            -o appcast-output/appcast.xml 2>/dev/null || true

          # Windows installer
          netsparkle-generate-appcast \
            --single-file "artifacts/TombLauncher-$VERSION-setup.exe" \
            --file-version "$VERSION" \
            --os windows \
            --channel stable \
            --private-key-override "$APPCAST_PRIVATE_KEY" \
            --use-ed25519-signature-attribute \
            --base-url "$BASE_URL" \
            --product-name "Tomb Launcher" \
            --human-readable \
            --reparse-existing \
            -a appcast-output/

          # Linux AppImage
          netsparkle-generate-appcast \
            --single-file "artifacts/TombLauncher-$VERSION-x86_64.AppImage" \
            --file-version "$VERSION" \
            --os linux \
            --channel stable \
            --private-key-override "$APPCAST_PRIVATE_KEY" \
            --use-ed25519-signature-attribute \
            --base-url "$BASE_URL" \
            --product-name "Tomb Launcher" \
            --human-readable \
            --reparse-existing \
            -a appcast-output/

          # Windows portable ZIP — canale portable
          netsparkle-generate-appcast \
            --single-file "artifacts/TombLauncher-$VERSION-portable-win-x64.zip" \
            --file-version "$VERSION" \
            --os windows \
            --channel portable \
            --private-key-override "$APPCAST_PRIVATE_KEY" \
            --use-ed25519-signature-attribute \
            --base-url "$BASE_URL" \
            --product-name "Tomb Launcher" \
            --human-readable \
            --reparse-existing \
            -a appcast-output/

      - name: Upload appcast.xml to tomblauncher.app
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: appcast-output/appcast.xml
          target: ${{ secrets.DEPLOY_SSH_PATH }}
          strip_components: 1
